<svg
  xmlns="http://www.w3.org/2000/svg"
  width="620"
  height="132"
  viewBox="0 0 620 132"
  fill="none"
  role="img"
  aria-labelledby="securehabitLogoTitle securehabitLogoDescription"
>
  <title id="securehabitLogoTitle">
    SecureHabit
  </title>

  <desc id="securehabitLogoDescription">
    SecureHabit logo with an interwoven three-dimensional triangular symbol
    and a cyan, blue, violet and magenta wordmark.
  </desc>

  <defs>
    <linearGradient
      id="securehabit-symbol-gradient-a"
      x1="16"
      y1="16"
      x2="116"
      y2="113"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#2AF0DF"/>
      <stop offset="0.44" stop-color="#16D7C4"/>
      <stop offset="1" stop-color="#318CF4"/>
    </linearGradient>

    <linearGradient
      id="securehabit-symbol-gradient-b"
      x1="113"
      y1="104"
      x2="20"
      y2="107"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#318CF4"/>
      <stop offset="0.52" stop-color="#626CF6"/>
      <stop offset="1" stop-color="#8757EF"/>
    </linearGradient>

    <linearGradient
      id="securehabit-symbol-gradient-c"
      x1="25"
      y1="106"
      x2="65"
      y2="14"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#8757EF"/>
      <stop offset="0.48" stop-color="#ED149F"/>
      <stop offset="1" stop-color="#318CF4"/>
    </linearGradient>

    <linearGradient
      id="securehabit-secure-gradient"
      x1="153"
      y1="28"
      x2="366"
      y2="98"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#2AF0DF"/>
      <stop offset="0.42" stop-color="#16D7C4"/>
      <stop offset="1" stop-color="#318CF4"/>
    </linearGradient>

    <linearGradient
      id="securehabit-habit-gradient"
      x1="365"
      y1="30"
      x2="584"
      y2="101"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#626CF6"/>
      <stop offset="0.5" stop-color="#8757EF"/>
      <stop offset="1" stop-color="#ED149F"/>
    </linearGradient>

    <linearGradient
      id="securehabit-highlight-gradient"
      x1="24"
      y1="20"
      x2="108"
      y2="108"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter
      id="securehabit-symbol-glow"
      x="-40%"
      y="-40%"
      width="180%"
      height="180%"
      color-interpolation-filters="sRGB"
    >
      <feGaussianBlur
        stdDeviation="4.2"
        result="blur"
      />

      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.086
          0 0 0 0 0.843
          0 0 0 0 0.769
          0 0 0 0.28 0
        "
        result="coloredBlur"
      />

      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter
      id="securehabit-wordmark-shadow"
      x="-10%"
      y="-30%"
      width="120%"
      height="170%"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="4"
        stdDeviation="4"
        flood-color="#001225"
        flood-opacity="0.34"
      />
    </filter>

    <clipPath id="securehabit-symbol-clip">
      <rect
        x="0"
        y="0"
        width="132"
        height="132"
        rx="12"
      />
    </clipPath>
  </defs>

  <!--
    Three-dimensional connected learning symbol.
    Dark under-strokes create the visual over-and-under ribbon effect.
  -->
  <g
    clip-path="url(#securehabit-symbol-clip)"
    filter="url(#securehabit-symbol-glow)"
  >
    <path
      d="M59 12L116 111"
      stroke="#001225"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M116 111H18"
      stroke="#001225"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M18 111L59 12"
      stroke="#001225"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M59 12L116 111"
      stroke="url(#securehabit-symbol-gradient-a)"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M116 111H18"
      stroke="url(#securehabit-symbol-gradient-b)"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M18 111L59 12"
      stroke="url(#securehabit-symbol-gradient-c)"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Interior perspective rails -->

    <path
      d="M59 39L98 106"
      stroke="#001225"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M98 106H39"
      stroke="#001225"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M39 106L59 59"
      stroke="#001225"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M59 39L98 106"
      stroke="url(#securehabit-symbol-gradient-a)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M98 106H39"
      stroke="url(#securehabit-symbol-gradient-b)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M39 106L59 59"
      stroke="url(#securehabit-symbol-gradient-c)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Interwoven crossing caps -->

    <path
      d="M99.5 82.5L116 111"
      stroke="#001225"
      stroke-width="22"
      stroke-linecap="round"
    />

    <path
      d="M99.5 82.5L116 111"
      stroke="url(#securehabit-symbol-gradient-a)"
      stroke-width="13"
      stroke-linecap="round"
    />

    <path
      d="M18 111H47"
      stroke="#001225"
      stroke-width="22"
      stroke-linecap="round"
    />

    <path
      d="M18 111H47"
      stroke="url(#securehabit-symbol-gradient-b)"
      stroke-width="13"
      stroke-linecap="round"
    />

    <path
      d="M43.5 49L59 12"
      stroke="#001225"
      stroke-width="22"
      stroke-linecap="round"
    />

    <path
      d="M43.5 49L59 12"
      stroke="url(#securehabit-symbol-gradient-c)"
      stroke-width="13"
      stroke-linecap="round"
    />

    <!-- Fine dimensional highlights -->

    <path
      d="M57.2 17L111.5 109"
      stroke="url(#securehabit-highlight-gradient)"
      stroke-width="1.8"
      stroke-linecap="round"
      opacity="0.78"
    />

    <path
      d="M109 107.3H24"
      stroke="#FFFFFF"
      stroke-width="1.4"
      stroke-linecap="round"
      opacity="0.24"
    />

    <path
      d="M22.3 106L57 21"
      stroke="#FFFFFF"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.28"
    />

    <!-- Connection nodes -->

    <circle
      cx="59"
      cy="12"
      r="3.1"
      fill="#2AF0DF"
    />

    <circle
      cx="116"
      cy="111"
      r="3.1"
      fill="#626CF6"
    />

    <circle
      cx="18"
      cy="111"
      r="3.1"
      fill="#ED149F"
    />

    <circle
      cx="59"
      cy="39"
      r="2.1"
      fill="#16D7C4"
    />

    <circle
      cx="98"
      cy="106"
      r="2.1"
      fill="#626CF6"
    />

    <circle
      cx="39"
      cy="106"
      r="2.1"
      fill="#ED149F"
    />
  </g>

  <!-- Wordmark -->

  <g filter="url(#securehabit-wordmark-shadow)">
    <text
      x="153"
      y="83"
      fill="url(#securehabit-secure-gradient)"
      font-family="'Arial Black', 'Trebuchet MS', Arial, sans-serif"
      font-size="57"
      font-weight="900"
      letter-spacing="-2.1"
    >
      Secure
    </text>

    <text
      x="372"
      y="83"
      fill="url(#securehabit-habit-gradient)"
      font-family="'Arial Black', 'Trebuchet MS', Arial, sans-serif"
      font-size="57"
      font-weight="900"
      letter-spacing="-2.1"
    >
      Habit
    </text>
  </g>

  <!-- Supporting baseline detail -->

  <path
    d="M156 101H560"
    stroke="url(#securehabit-secure-gradient)"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.22"
  />

  <circle
    cx="575"
    cy="101"
    r="2.5"
    fill="#ED149F"
    opacity="0.72"
  />
</svg>