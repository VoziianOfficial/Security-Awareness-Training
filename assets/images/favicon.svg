<svg
  xmlns="http://www.w3.org/2000/svg"
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
  role="img"
  aria-labelledby="securehabitFaviconTitle"
>
  <title id="securehabitFaviconTitle">
    SecureHabit
  </title>

  <defs>
    <linearGradient
      id="favicon-edge-one"
      x1="25"
      y1="10"
      x2="55"
      y2="55"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#2AF0DF"/>
      <stop offset="0.45" stop-color="#16D7C4"/>
      <stop offset="1" stop-color="#318CF4"/>
    </linearGradient>

    <linearGradient
      id="favicon-edge-two"
      x1="55"
      y1="54"
      x2="10"
      y2="54"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#318CF4"/>
      <stop offset="0.5" stop-color="#626CF6"/>
      <stop offset="1" stop-color="#8757EF"/>
    </linearGradient>

    <linearGradient
      id="favicon-edge-three"
      x1="10"
      y1="54"
      x2="27"
      y2="9"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#ED149F"/>
      <stop offset="0.5" stop-color="#8757EF"/>
      <stop offset="1" stop-color="#626CF6"/>
    </linearGradient>

    <linearGradient
      id="favicon-background"
      x1="7"
      y1="5"
      x2="58"
      y2="60"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#061E38"/>
      <stop offset="1" stop-color="#001225"/>
    </linearGradient>

    <filter
      id="favicon-glow"
      x="-40%"
      y="-40%"
      width="180%"
      height="180%"
      color-interpolation-filters="sRGB"
    >
      <feGaussianBlur
        stdDeviation="1.4"
        result="blur"
      />

      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.086
          0 0 0 0 0.843
          0 0 0 0 0.769
          0 0 0 0.38 0
        "
        result="coloredBlur"
      />

      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  

  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="15"
    fill="url(#favicon-background)"
  />

  <rect
    x="2.5"
    y="2.5"
    width="59"
    height="59"
    rx="14.5"
    stroke="#FFFFFF"
    stroke-opacity="0.08"
  />

  <g filter="url(#favicon-glow)">
    

