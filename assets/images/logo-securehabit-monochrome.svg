<svg
  xmlns="http://www.w3.org/2000/svg"
  width="620"
  height="132"
  viewBox="0 0 620 132"
  fill="none"
  role="img"
  aria-labelledby="securehabitMonoLogoTitle securehabitMonoLogoDescription"
>
  <title id="securehabitMonoLogoTitle">
    SecureHabit
  </title>

  <desc id="securehabitMonoLogoDescription">
    Monochrome SecureHabit logo with an interwoven
    three-dimensional triangular symbol and wordmark.
  </desc>

  <defs>
    <filter
      id="securehabit-mono-shadow"
      x="-20%"
      y="-35%"
      width="140%"
      height="180%"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="4"
        stdDeviation="3.5"
        flood-color="#001225"
        flood-opacity="0.16"
      />
    </filter>

    <clipPath id="securehabit-mono-symbol-clip">
      <rect
        x="0"
        y="0"
        width="132"
        height="132"
        rx="12"
      />
    </clipPath>

    <mask
      id="securehabit-mono-highlight-mask"
      maskUnits="userSpaceOnUse"
      x="0"
      y="0"
      width="132"
      height="132"
    >
      <rect
        x="0"
        y="0"
        width="132"
        height="132"
        fill="white"
      />

      <path
        d="M52 29L59 12L67 25"
        stroke="black"
        stroke-width="4"
        stroke-linecap="round"
      />

      <path
        d="M99 111H116"
        stroke="black"
        stroke-width="4"
        stroke-linecap="round"
      />

      <path
        d="M18 111H35"
        stroke="black"
        stroke-width="4"
        stroke-linecap="round"
      />
    </mask>
  </defs>

  <!--
    MONOCHROME INTERWOVEN SYMBOL

    The full mark uses only the SecureHabit navy tone.
    Depth is created through stroke weight, opacity and
    controlled negative spacing rather than extra colors.
  -->

  <g
    clip-path="url(#securehabit-mono-symbol-clip)"
    filter="url(#securehabit-mono-shadow)"
  >
    <!-- Outer ribbon shadow structure -->

    <path
      d="M59 12L116 111"
      stroke="#061E38"
      stroke-opacity="0.17"
      stroke-width="23"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M116 111H18"
      stroke="#061E38"
      stroke-opacity="0.17"
      stroke-width="23"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M18 111L59 12"
      stroke="#061E38"
      stroke-opacity="0.17"
      stroke-width="23"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Main outer ribbons -->

    <path
      d="M59 12L116 111"
      stroke="#061E38"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M116 111H18"
      stroke="#061E38"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M18 111L59 12"
      stroke="#061E38"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Inner perspective rails -->

    <path
      d="M59 39L98 106"
      stroke="#061E38"
      stroke-opacity="0.2"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M98 106H39"
      stroke="#061E38"
      stroke-opacity="0.2"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M39 106L59 59"
      stroke="#061E38"
      stroke-opacity="0.2"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M59 39L98 106"
      stroke="#061E38"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M98 106H39"
      stroke="#061E38"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M39 106L59 59"
      stroke="#061E38"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Crossing caps preserve the woven construction -->

    <path
      d="M99.5 82.5L116 111"
      stroke="#F4F7FB"
      stroke-width="23"
      stroke-linecap="round"
    />

    <path
      d="M99.5 82.5L116 111"
      stroke="#061E38"
      stroke-width="13"
      stroke-linecap="round"
    />

    <path
      d="M18 111H47"
      stroke="#F4F7FB"
      stroke-width="23"
      stroke-linecap="round"
    />

    <path
      d="M18 111H47"
      stroke="#061E38"
      stroke-width="13"
      stroke-linecap="round"
    />

    <path
      d="M43.5 49L59 12"
      stroke="#F4F7FB"
      stroke-width="23"
      stroke-linecap="round"
    />

    <path
      d="M43.5 49L59 12"
      stroke="#061E38"
      stroke-width="13"
      stroke-linecap="round"
    />

    <!-- Subtle one-color highlights -->

    <path
      d="M57.2 17L111.5 109"
      stroke="#FFFFFF"
      stroke-width="1.7"
      stroke-linecap="round"
      opacity="0.36"
      mask="url(#securehabit-mono-highlight-mask)"
    />

    <path
      d="M108.5 107.2H24"
      stroke="#FFFFFF"
      stroke-width="1.35"
      stroke-linecap="round"
      opacity="0.28"
    />

    <path
      d="M22.4 106L57 21"
      stroke="#FFFFFF"
      stroke-width="1.35"
      stroke-linecap="round"
      opacity="0.28"
    />

    <!-- Connection nodes -->

    <circle
      cx="59"
      cy="12"
      r="3.25"
      fill="#061E38"
    />

    <circle
      cx="116"
      cy="111"
      r="3.25"
      fill="#061E38"
    />

    <circle
      cx="18"
      cy="111"
      r="3.25"
      fill="#061E38"
    />

    <circle
      cx="59"
      cy="39"
      r="2.1"
      fill="#061E38"
    />

    <circle
      cx="98"
      cy="106"
      r="2.1"
      fill="#061E38"
    />

    <circle
      cx="39"
      cy="106"
      r="2.1"
      fill="#061E38"
    />
  </g>

  <!-- Monochrome wordmark -->

  <g filter="url(#securehabit-mono-shadow)">
    <text
      x="153"
      y="83"
      fill="#061E38"
      font-family="'Arial Black', 'Trebuchet MS', Arial, sans-serif"
      font-size="57"
      font-weight="900"
      letter-spacing="-2.1"
    >
      Secure
    </text>

    <text
      x="372"
      y="83"
      fill="#061E38"
      font-family="'Arial Black', 'Trebuchet MS', Arial, sans-serif"
      font-size="57"
      font-weight="900"
      letter-spacing="-2.1"
    >
      Habit
    </text>
  </g>

  <!-- Dimensional wordmark highlights -->

  <path
    d="M159 39C224 20 301 21 360 40"
    stroke="#FFFFFF"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.16"
  />

  <path
    d="M380 39C442 21 515 23 578 44"
    stroke="#FFFFFF"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.14"
  />

  <!-- Monochrome baseline -->

  <path
    d="M156 101H560"
    stroke="#061E38"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.28"
  />

  <circle
    cx="567"
    cy="101"
    r="1.5"
    fill="#061E38"
    opacity="0.52"
  />

  <circle
    cx="575"
    cy="101"
    r="2.6"
    fill="#061E38"
  />
</svg>